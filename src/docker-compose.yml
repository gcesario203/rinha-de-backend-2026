# Limites alinhados ao config.json da rinha (max_cpu: 1.0, max_memory_mb: 350).
# Arquitetura obrigatória: HAProxy + pelo menos 2 APIs em round-robin (docs/en/ARCHITECTURE.md).
# Total: 0.05 + 0.475 + 0.475 = 1.0 CPU ; 16M + 167M + 167M = 350M.
# HAProxy enxuto (8192 conn, sem stats web) cabe em 16M; o restante vai para as APIs
# acomodarem o mmap de ~168M de vetores + working set do GC sem thrash.
#
# Os ficheiros pesados (references.bin + references.balltree.bin + references.kdtree.bin) são gerados
# DURANTE o `docker build` (ver Dockerfile, stage `build`) e ficam imutáveis
# dentro da imagem em /var/lib/antifraud. Por isso não há mais `volumes:` partilhado.

version: '3.8'

services:
  api1:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-1
    networks:
      - antifraud_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
      - Data__BallTreeCachePath=/var/lib/antifraud/references.balltree.bin
      - Data__KdTreeCachePath=/var/lib/antifraud/references.kdtree.bin
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 167M

  api2:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-2
    networks:
      - antifraud_network
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
      - Data__BallTreeCachePath=/var/lib/antifraud/references.balltree.bin
      - Data__KdTreeCachePath=/var/lib/antifraud/references.kdtree.bin
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 167M

  haproxy:
    image: haproxy:2.8
    container_name: antifraud-haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    networks:
      - antifraud_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 16M

  # ---------------------------------------------------------------------------
  # Cliente de carga (k6). Não sobe com `docker compose up` normal.
  # Uso:
  #   docker compose --profile bench run --rm k6-smoke
  #   docker compose --profile bench run --rm k6-test
  # ---------------------------------------------------------------------------
  k6-smoke:
    image: grafana/k6:0.51.0
    profiles: ["bench"]
    networks:
      - antifraud_network
    volumes:
      - ../test:/work/test
    working_dir: /work
    environment:
      - BASE_URL=http://haproxy:9999
      - K6_NO_USAGE_REPORT=true
    command: ["run", "test/smoke.js"]

  k6-test:
    image: grafana/k6:0.51.0
    profiles: ["bench"]
    networks:
      - antifraud_network
    volumes:
      - ../test:/work/test
    working_dir: /work
    environment:
      - BASE_URL=http://haproxy:9999
      - K6_NO_USAGE_REPORT=true
    command: ["run", "test/test.js"]

networks:
  antifraud_network:
    driver: bridge
