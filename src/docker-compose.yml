# Limites alinhados ao config.json da rinha (max_cpu: 1.0, max_memory_mb: 350).
# Arquitetura obrigatória: HAProxy + pelo menos 2 APIs em round-robin (docs/en/ARCHITECTURE.md).
# Total: 0.05 + 0.475 + 0.475 = 1.0 CPU ; 32M + 159M + 159M = 350M.

version: '3.8'

volumes:
  vector_dataset_bin:

services:
  api1:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-1
    networks:
      - antifraud_network
    volumes:
      - vector_dataset_bin:/var/lib/antifraud
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 159M

  api2:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-2
    networks:
      - antifraud_network
    volumes:
      - vector_dataset_bin:/var/lib/antifraud
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 159M

  haproxy:
    image: haproxy:2.8
    container_name: antifraud-haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    networks:
      - antifraud_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M

  # ---------------------------------------------------------------------------
  # Cliente de carga (k6). Não sobe com `docker compose up` normal.
  # Uso:
  #   docker compose --profile bench run --rm k6-smoke
  #   docker compose --profile bench run --rm k6-test
  # ---------------------------------------------------------------------------
  k6-smoke:
    image: grafana/k6:0.51.0
    profiles: ["bench"]
    networks:
      - antifraud_network
    volumes:
      - ../test:/work/test
    working_dir: /work
    environment:
      - BASE_URL=http://haproxy:9999
      - K6_NO_USAGE_REPORT=true
    command: ["run", "test/smoke.js"]

  k6-test:
    image: grafana/k6:0.51.0
    profiles: ["bench"]
    networks:
      - antifraud_network
    volumes:
      - ../test:/work/test
    working_dir: /work
    environment:
      - BASE_URL=http://haproxy:9999
      - K6_NO_USAGE_REPORT=true
    command: ["run", "test/test.js"]

networks:
  antifraud_network:
    driver: bridge
