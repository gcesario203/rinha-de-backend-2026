version: '3.8'

volumes:
  vector_dataset_bin:

services:
  api1:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-1
    networks:
      - antifraud_network
    volumes:
      - vector_dataset_bin:/var/lib/antifraud
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
    restart: always

  api2:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-2
    networks:
      - antifraud_network
    volumes:
      - vector_dataset_bin:/var/lib/antifraud
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
    restart: always

  haproxy:
    image: haproxy:2.8
    container_name: antifraud-haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    networks:
      - antifraud_network
    restart: always

networks:
  antifraud_network:
    driver: bridge
