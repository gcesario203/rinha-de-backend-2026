# Limites alinhados ao config.json da rinha (max_cpu: 1.0, max_memory_mb: 350).
# Distribuição: HAProxy leve + duas réplicas da API em partes iguais.

version: '3.8'

volumes:
  vector_dataset_bin:

services:
  api1:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-1
    networks:
      - antifraud_network
    volumes:
      - vector_dataset_bin:/var/lib/antifraud
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 159M

  api2:
    build:
      context: ..
      dockerfile: src/anti-fraud-api/Dockerfile
    container_name: anti-fraud-api-2
    networks:
      - antifraud_network
    volumes:
      - vector_dataset_bin:/var/lib/antifraud
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AntiFraud__ClassifierStrategy=BallTree
      - Data__BinaryDatasetPath=/var/lib/antifraud/references.bin
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.475'
          memory: 159M

  haproxy:
    image: haproxy:2.8
    container_name: antifraud-haproxy
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    networks:
      - antifraud_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M

networks:
  antifraud_network:
    driver: bridge
