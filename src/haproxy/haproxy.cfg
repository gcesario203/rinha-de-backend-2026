global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 10s
    timeout client  1m
    timeout server  1m

frontend http_front
    bind *:9999
    default_backend api_back

backend api_back
    mode http
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200

    server api1 api1:80 check inter 2000 rise 2 fall 3
    server api2 api2:80 check inter 2000 rise 2 fall 3
